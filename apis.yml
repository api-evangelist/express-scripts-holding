aid: express-scripts-holding
name: Express Scripts Holding
description: >-
  Express Scripts is a pharmacy benefit management (PBM) company, now part
  of Cigna's Evernorth Health Services, that processes prescription claims
  and provides home delivery and specialty pharmacy services for clients
  including health plans and employers. The Express Scripts Developer Portal
  exists for partner and client integrations, but its API catalog is not
  openly published; access is gated to authenticated partners.
